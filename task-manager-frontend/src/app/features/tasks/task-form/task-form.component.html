<div class="page-wrapper">
  <div class="page-header">
    <button mat-icon-button routerLink="/tasks">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="page-title">{{ isEditMode ? 'Editar tarefa' : 'Nova tarefa' }}</h1>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Título</mat-label>
          <input matInput formControlName="title" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descrição</mat-label>
          <textarea matInput formControlName="description" rows="4"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status">
            @for (s of statusOptions; track s) {
              <mat-option [value]="s">{{ s }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Data de vencimento</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="dueDate" />
          <mat-datepicker-toggle matIconSuffix [for]="picker" />
          <mat-datepicker #picker />
        </mat-form-field>

        <div class="form-actions">
          <button mat-stroked-button type="button" routerLink="/tasks">Cancelar</button>
          <button mat-flat-button class="btn-save" type="submit">Salvar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
