version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: task-manager-postgres
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./task-manager-api
      dockerfile: Dockerfile
    container_name: task-manager-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskmanager
      DB_USER: taskmanager
      DB_PASSWORD: taskmanager
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./task-manager-frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pg_data:

