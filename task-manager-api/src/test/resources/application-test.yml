spring:
  datasource:
    url: jdbc:h2:mem:taskmanagerdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: false

security:
  jwt:
    secret: test-secret-key-for-junit-only
    expiration-ms: 3600000

